<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Kullanıcı Formu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

    <style>
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .form-container {
            padding: 30px;
            background-color: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .form-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .signature-pad {
            width: 100%;
            height: 200px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
        .signature-btns {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- Language Selector -->
<div class="d-flex justify-content-end m-3">
    <div class="btn-group">
        <button type="button" class="btn btn-outline-secondary">Dil Seçin</button>
        <button type="button" class="btn btn-outline-secondary dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="visually-hidden">Dil Seçin</span>
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#" id="lang-tr">Türkçe</a></li>
            <li><a class="dropdown-item" href="#" id="lang-en">English</a></li>
            <li><a class="dropdown-item" href="#" id="lang-ru">Русский</a></li>
            <li><a class="dropdown-item" href="#" id="lang-de">Deutsch</a></li>
        </ul>
    </div>
</div>

<!-- Main Form Container -->
<div class="container">
    <div class="form-container">
        <h3 class="form-title" id="form-title">Kullanıcı Bilgileri</h3>
        <form id="userForm">
            <!-- Pasaport/Kimlik Resmi -->
            <div class="mb-3">
                <label for="passportImage" class="form-label" id="passport-label">Pasaport/Kimlik Resmi Yükleyin</label>
                <input type="file" class="form-control" id="passportImage" accept="image/*">
                <button type="button" class="btn btn-outline-secondary mt-2" onclick="takePicture()">Kameradan Resim Çek</button>
                <img id="preview" class="mt-3" style="display:none; max-width: 100%; height: auto;">
            </div>

            <!-- Ad Soyad -->
            <div class="mb-3">
                <label for="fullName" class="form-label" id="fullName-label">Ad Soyad</label>
                <input type="text" class="form-control" id="fullName" placeholder="Ad Soyad">
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label" id="email-label">E-posta Adresi</label>
                <input type="email" class="form-control" id="email" placeholder="E-posta Adresi">
            </div>

            <!-- Telefon -->
            <div class="mb-3">
                <label for="phone" class="form-label" id="phone-label">Telefon Numarası</label>
                <input type="tel" class="form-control" id="phone" placeholder="Telefon Numarası">
            </div>

            <!-- Onay Kutuları -->
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="termsCheckbox">
                    <label class="form-check-label" for="termsCheckbox" id="terms-label">Açık Rıza Onaylıyorum</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="kvkkCheckbox">
                    <label class="form-check-label" for="kvkkCheckbox" id="kvkk-label">KVKK Onaylıyorum</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="marketingCheckbox">
                    <label class="form-check-label" for="marketingCheckbox" id="marketing-label">Reklam ve Ticari İzin Veriyorum</label>
                </div>
            </div>

            <!-- İmza Alanı -->
            <div class="mb-3">
                <label for="signature" class="form-label" id="signature-label">İmzanız</label>
                <canvas id="signature" class="signature-pad"></canvas>
                <button type="button" class="btn btn-danger signature-btns" onclick="clearSignature()">İmzayı Temizle</button>
            </div>

            <!-- Submit Butonu -->
            <button type="submit" class="btn btn-primary w-100" id="submit-btn">Gönder</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>
    let signaturePad;
    document.addEventListener('DOMContentLoaded', function () {
        // Initialize Signature Pad
        signaturePad = new SignaturePad(document.getElementById('signature'));
        
        // Handle language selection
        document.getElementById('lang-tr').addEventListener('click', () => setLanguage('tr'));
        document.getElementById('lang-en').addEventListener('click', () => setLanguage('en'));
        document.getElementById('lang-ru').addEventListener('click', () => setLanguage('ru'));
        document.getElementById('lang-de').addEventListener('click', () => setLanguage('de'));
    });

    function takePicture() {
        alert("Kamera fonksiyonu burada aktif edilmelidir.");
    }

    function clearSignature() {
        signaturePad.clear();
    }

    function setLanguage(lang) {
        const translations = {
            tr: {
                "Kullanıcı Bilgileri": "Kullanıcı Bilgileri",
                "Pasaport/Kimlik Resmi Yükleyin": "Pasaport/Kimlik Resmi Yükleyin",
                "Ad Soyad": "Ad Soyad",
                "E-posta Adresi": "E-posta Adresi",
                "Telefon Numarası": "Telefon Numarası",
                "Açık Rıza Onaylıyorum": "Açık Rıza Onaylıyorum",
                "KVKK Onaylıyorum": "KVKK Onaylıyorum",
                "Reklam ve Ticari İzin Veriyorum": "Reklam ve Ticari İzin Veriyorum",
                "İmzanız": "İmzanız",
                "Gönder": "Gönder"
            },
            en: {
                "Kullanıcı Bilgileri": "User Information",
                "Pasaport/Kimlik Resmi Yükleyin": "Upload Passport/ID Image",
                "Ad Soyad": "Full Name",
                "E-posta Adresi": "Email Address",
                "Telefon Numarası": "Phone Number",
                "Açık Rıza Onaylıyorum": "I Agree to the Consent",
                "KVKK Onaylıyorum": "I Agree to KVKK",
                "Reklam ve Ticari İzin Veriyorum": "I Agree to Marketing and Commercial Use",
                "İmzanız": "Your Signature",
                "Gönder": "Submit"
            },
            // Add Russian and German translations similarly
        };

        const langStrings = translations[lang];

        document.getElementById('form-title').innerText = langStrings["Kullanıcı Bilgileri"];
        document.getElementById('passport-label').innerText = langStrings["Pasaport/Kimlik Resmi Yükleyin"];
        document.getElementById('fullName-label').innerText = langStrings["Ad Soyad"];
        document.getElementById('email-label').innerText = langStrings["E-posta Adresi"];
        document.getElementById('phone-label').innerText = langStrings["Telefon Numarası"];
        document.getElementById('terms-label').innerText = langStrings["Açık Rıza Onaylıyorum"];
        document.getElementById('kvkk-label').innerText = langStrings["KVKK Onaylıyorum"];
        document.getElementById('marketing-label').innerText = langStrings["Reklam ve Ticari İzin Veriyorum"];
        document.getElementById('signature-label').innerText = langStrings["İmzanız"];
        document.getElementById('submit-btn').innerText = langStrings["Gönder"];
    }
</script>

</body>
</html>
